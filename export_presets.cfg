; MallCross export presets.
;
; This file is hand-authored (rather than generated by the editor) so the
; release CI workflow can build Linux and Windows binaries headlessly.
;
; Two presets:
;   - "Linux/X11"       — x86_64 ELF, .pck embedded for single-file ship.
;   - "Windows Desktop" — x86_64 PE32+, .pck embedded. We disable Windows
;     resource modification (application/modify_resources=false) so the
;     export does not require wine + rcedit + osslsigncode on the Linux
;     runner. Tradeoff: the .exe gets a generic icon and no version info
;     embedded. Acceptable for v1.0.0.
;
; Both presets embed the .pck so distribution is a single binary per OS.

[preset.0]

name="Linux/X11"
platform="Linux/X11"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path=""
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
binary_format/architecture="x86_64"
ssh_remote_deploy/enabled=false
ssh_remote_deploy/host="user@host_ip"
ssh_remote_deploy/port="22"
ssh_remote_deploy/extra_args_ssh=""
ssh_remote_deploy/extra_args_scp=""
ssh_remote_deploy/run_script=""
ssh_remote_deploy/cleanup_script=""

